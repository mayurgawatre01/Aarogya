<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ArogyaAI - Verify Email</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .otp-inputs { display: flex; gap: 10px; justify-content: center; margin: 24px 0; }
        .otp-inputs input { width: 44px; height: 52px; text-align: center; font-size: 22px; font-weight: 700; border: 1.5px solid var(--border); border-radius: var(--radius-sm); outline: none; background: var(--bg); color: var(--text); transition: all var(--transition-fast); }
        .otp-inputs input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px var(--primary-glow); background: var(--card); }
        input[name="otp"] { display: none; }
        .resend-btn { background: none; border: none; color: var(--primary); cursor: pointer; font-size: 13px; font-weight: 700; text-decoration: underline; }
        .resend-btn:hover { color: var(--primary-light); }
    </style>
</head>
<body>

<!-- STICKY NAVBAR -->
<nav class="landing-nav glass">
    <a href="/" class="logo-container">
        <span class="logo-icon">🩺</span>
        <span class="logo-text">Arogya<span>AI</span></span>
    </a>
    <div class="nav-actions">
        <a href="/" class="nav-link">Home</a>
        <a href="/login" class="nav-link">Login</a>
        <button class="dark-toggle" onclick="toggleDark()">🌙</button>
    </div>
</nav>

<!-- VERIFICATION BOX -->
<div class="auth-wrapper">
    <div class="form-container glass animate-fade-in-up" style="text-align: center;">
        <div class="form-header">
            <div style="font-size: 40px; margin-bottom: 12px; display: inline-block;">📧</div>
            <h2>Verify Your Email</h2>
            <p class="form-subtitle">We sent a 6-digit OTP to<br><strong>{{ email }}</strong></p>
        </div>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for msg in messages %}
                    <div class="flash-success" style="text-align: left;">{{ msg }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" id="otpForm">
            <input type="hidden" name="email" value="{{ email }}">
            <input type="hidden" name="otp" id="otpHidden">
            <div class="otp-inputs">
                <input type="text" maxlength="1" class="otp-digit" inputmode="numeric">
                <input type="text" maxlength="1" class="otp-digit" inputmode="numeric">
                <input type="text" maxlength="1" class="otp-digit" inputmode="numeric">
                <input type="text" maxlength="1" class="otp-digit" inputmode="numeric">
                <input type="text" maxlength="1" class="otp-digit" inputmode="numeric">
                <input type="text" maxlength="1" class="otp-digit" inputmode="numeric">
            </div>
            <button type="submit" class="btn-primary form-submit-btn">Verify OTP</button>
        </form>

        <div class="form-footer" style="margin-top: 24px;">
            Didn't receive OTP?
            <form method="POST" action="/resend_otp" style="display:inline;">
                <input type="hidden" name="email" value="{{ email }}">
                <button type="submit" class="resend-btn">Resend OTP</button>
            </form>
        </div>
    </div>
</div>

<script>
function toggleDark() {
    document.body.classList.toggle('dark-mode');
    const isDark = document.body.classList.contains('dark-mode');
    localStorage.setItem('dark', isDark);
    document.querySelector('.dark-toggle').textContent = isDark ? '☀️' : '🌙';
}
if (localStorage.getItem('dark') === 'true') {
    document.body.classList.add('dark-mode');
    document.querySelector('.dark-toggle').textContent = '☀️';
}

const digits = document.querySelectorAll('.otp-digit');
digits.forEach((input, i) => {
    input.addEventListener('input', () => {
        if (input.value && i < digits.length - 1) digits[i+1].focus();
        updateHidden();
    });
    input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !input.value && i > 0) digits[i-1].focus();
    });
});
function updateHidden() {
    document.getElementById('otpHidden').value = [...digits].map(d => d.value).join('');
}
document.getElementById('otpForm').addEventListener('submit', updateHidden);
</script>
</body>
</html>
