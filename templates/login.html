<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ArogyaAI - Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<!-- STICKY NAVBAR -->
<nav class="landing-nav glass">
    <a href="/" class="logo-container">
        <span class="logo-icon">🩺</span>
        <span class="logo-text">Arogya<span>AI</span></span>
    </a>
    <div class="nav-actions">
        <a href="/" class="nav-link">Home</a>
        <a href="/register" class="nav-link">Register</a>
        <button class="dark-toggle" onclick="toggleDark()">🌙</button>
    </div>
</nav>

<!-- LOGIN BOX -->
<div class="auth-wrapper">
    <div class="form-container glass animate-fade-in-up">
        <div class="form-header">
            <div style="font-size: 40px; margin-bottom: 12px; display: inline-block;">🔐</div>
            <h2>Welcome Back</h2>
            <p class="form-subtitle">Login to access your smart health companion</p>
        </div>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <div class="flash-error">⚠️ {{ messages[0] }}</div>
          {% endif %}
        {% endwith %}

        <form method="POST" action="/login">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="email@example.com" required autocomplete="email">
                <div class="field-msg" id="email-msg"></div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
                <div class="field-msg" id="pass-msg"></div>
            </div>

            <button type="submit" id="login-btn" class="btn-primary form-submit-btn" disabled>Sign In</button>
        </form>

        <div class="form-footer">
            Don't have an account? <a href="/register">Register here</a>
        </div>

        <!-- DEMO CREDS -->
        <div class="demo-login-box">
            <div class="demo-title">Quick Demo Access</div>
            <div class="demo-btn-row">
                <button onclick="fillDemo('patient')" class="demo-btn">👤 Patient Demo</button>
                <button onclick="fillDemo('doctor')" class="demo-btn">🩺 Doctor Demo</button>
            </div>
        </div>
    </div>
</div>

<script>
function toggleDark() {
    document.body.classList.toggle('dark-mode');
    const isDark = document.body.classList.contains('dark-mode');
    localStorage.setItem('dark', isDark);
    document.querySelector('.dark-toggle').textContent = isDark ? '☀️' : '🌙';
}
if (localStorage.getItem('dark') === 'true') {
    document.body.classList.add('dark-mode');
    document.querySelector('.dark-toggle').textContent = '☀️';
}
</script>
<script src="{{ url_for('static', filename='js/login.js') }}"></script>
<script>
function fillDemo(role) {
    document.getElementById('email').value = role === 'patient' ? 'patient@demo.com' : 'doctor@demo.com';
    document.getElementById('password').value = 'Demo1234';
    document.getElementById('email').dispatchEvent(new Event('input'));
    document.getElementById('password').dispatchEvent(new Event('input'));
}

// Clerk Authentication Loader
const CLERK_PUBLISHABLE_KEY = "{{ clerk_pub_key }}";

if (CLERK_PUBLISHABLE_KEY && CLERK_PUBLISHABLE_KEY !== "None" && CLERK_PUBLISHABLE_KEY.trim() !== "") {
    // Hide native elements
    const nativeForm = document.querySelector('form');
    if (nativeForm) nativeForm.style.display = 'none';
    const formFooter = document.querySelector('.form-footer');
    if (formFooter) formFooter.style.display = 'none';
    const demoBox = document.querySelector('.demo-login-box');
    if (demoBox) demoBox.style.display = 'none';
    const headerTitle = document.querySelector('.form-header p');
    if (headerTitle) headerTitle.textContent = "Sign in securely via Clerk";

    // Create Clerk mounting div
    const mountDiv = document.createElement('div');
    mountDiv.id = 'clerk-signin-mount';
    mountDiv.style.marginTop = '20px';
    document.querySelector('.form-container').appendChild(mountDiv);

    // Load Clerk CDN SDK
    const script = document.createElement('script');
    script.setAttribute('data-clerk-publishable-key', CLERK_PUBLISHABLE_KEY);
    script.src = "https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/dist/clerk.browser.js";
    script.crossOrigin = "anonymous";
    script.async = true;

    script.onload = async () => {
        await window.Clerk.load();
        if (window.Clerk.user) {
            // User verified. Synchronize details with Flask session
            const email = window.Clerk.user.primaryEmailAddress.emailAddress;
            const name = window.Clerk.user.fullName;

            const res = await fetch('/api/auth/clerk', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, name })
            });
            const data = await res.json();
            if (data.success) {
                window.location.href = data.redirect;
            } else {
                alert("Auth synchronization failed: " + data.error);
            }
        } else {
            // Mount Clerk Auth UI
            window.Clerk.mountSignIn(document.getElementById('clerk-signin-mount'), {
                afterSignInUrl: window.location.href,
                afterSignUpUrl: window.location.href
            });
        }
    };
    document.body.appendChild(script);
}
</script>
</body>
</html>
