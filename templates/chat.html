<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>VitaCure - Chat</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .chat-wrap { max-width: 800px; margin: 0 auto; padding: 24px 20px; }
        .section-title { font-size: 20px; font-weight: 700; color: #0a1931; margin-bottom: 16px; }

        /* Doctor selector */
        .doc-list { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        .doc-pill {
            padding: 8px 16px; border-radius: 20px; font-size: 13px; cursor: pointer;
            border: 2px solid #e0f0f0; background: white; color: #555; transition: all 0.15s;
        }
        .doc-pill:hover, .doc-pill.active { border-color: #008080; background: #008080; color: white; }

        /* Chat box */
        .chat-box {
            background: white; border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            display: flex; flex-direction: column; height: 520px;
            overflow: hidden;
        }
        .chat-header {
            background: linear-gradient(135deg, #0a1931, #008080);
            color: white; padding: 14px 20px;
            display: flex; align-items: center; gap: 12px;
        }
        .chat-avatar {
            width: 40px; height: 40px; border-radius: 50%;
            background: rgba(255,255,255,0.2);
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
        }
        .chat-header-info .name { font-size: 15px; font-weight: 700; }
        .chat-header-info .status { font-size: 12px; opacity: 0.8; }
        .online-dot { display: inline-block; width: 8px; height: 8px; background: #2ecc71; border-radius: 50%; margin-right: 4px; }

        /* Messages */
        .messages {
            flex: 1; overflow-y: auto; padding: 16px;
            display: flex; flex-direction: column; gap: 10px;
            background: #f8fffe;
        }
        .msg { max-width: 75%; display: flex; flex-direction: column; gap: 3px; }
        .msg.me    { align-self: flex-end; align-items: flex-end; }
        .msg.them  { align-self: flex-start; align-items: flex-start; }
        .bubble {
            padding: 10px 14px; border-radius: 16px; font-size: 14px; line-height: 1.5;
        }
        .me   .bubble { background: #008080; color: white; border-bottom-right-radius: 4px; }
        .them .bubble { background: white; color: #333; border-bottom-left-radius: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .msg-time { font-size: 11px; color: #aaa; }
        .typing-indicator .bubble { background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .typing-dots { display: flex; gap: 4px; align-items: center; padding: 4px 0; }
        .typing-dots span {
            width: 7px; height: 7px; background: #aaa; border-radius: 50%;
            animation: bounce 1s infinite;
        }
        .typing-dots span:nth-child(2) { animation-delay: 0.15s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.3s; }
        @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

        /* Input */
        .chat-input-bar {
            padding: 12px 16px; background: white; border-top: 1px solid #e8f5f5;
            display: flex; gap: 10px; align-items: flex-end;
        }
        .chat-input-bar textarea {
            flex: 1; padding: 10px 14px; border: 1px solid #c0e0e0;
            border-radius: 20px; font-size: 14px; resize: none;
            font-family: inherit; max-height: 100px; outline: none;
            background: #f8fffe;
        }
        .chat-input-bar textarea:focus { border-color: #008080; }
        .send-btn {
            width: 42px; height: 42px; border-radius: 50%; border: none;
            background: #008080; color: white; font-size: 18px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .send-btn:hover { background: #006666; }

        /* Quick replies */
        .quick-replies { padding: 8px 16px; display: flex; gap: 8px; flex-wrap: wrap; background: white; border-top: 1px solid #f0f0f0; }
        .qr-btn {
            padding: 5px 12px; border-radius: 15px; font-size: 12px;
            border: 1px solid #c0e0e0; background: white; color: #008080;
            cursor: pointer; white-space: nowrap;
        }
        .qr-btn:hover { background: #e0f5f5; }

        .no-chat { text-align: center; padding: 60px 20px; color: #aaa; font-size: 14px; }
    </style>
</head>
<body>
<nav>
    <h1>VitaCure</h1>
    <div>
        <a href="/patient">Dashboard</a>
        <a href="/logout">Logout</a>
        <button class="dark-toggle" onclick="toggleDark()">🌙 Dark</button>
    </div>
</nav>

<div class="chat-wrap">
    <div class="section-title">💬 Patient–Doctor Chat</div>
    <p style="color:#666;font-size:14px;margin-bottom:16px;">Chat with your doctor for follow-ups, queries, or post-appointment guidance.</p>

    <!-- Doctor selector -->
    <div class="doc-list" id="docList"></div>

    <!-- Chat UI -->
    <div id="chatArea">
        <div class="no-chat">👆 Select a doctor above to start chatting</div>
    </div>
</div>

<footer><p>© 2026 VitaCure. All rights reserved.</p></footer>

<script>
function toggleDark() {
    document.body.classList.toggle('dark-mode');
    localStorage.setItem('dark', document.body.classList.contains('dark-mode'));
}
if (localStorage.getItem('dark') === 'true') document.body.classList.add('dark-mode');

const DOCTORS = [
    { id: 1, name: 'Dr. Sharma', spec: 'Cardiologist' },
    { id: 2, name: 'Dr. Mehta',  spec: 'Dermatologist' },
    { id: 3, name: 'Dr. Patel',  spec: 'Neurologist' },
    { id: 4, name: 'Dr. Rao',    spec: 'General Physician' },
    { id: 5, name: 'Dr. Joshi',  spec: 'Orthopedic' },
];

const QUICK_REPLIES = [
    'What are my test results?',
    'Can I stop the medicine?',
    'I have a follow-up question',
    'When is my next appointment?',
    'I have side effects',
];

let activeDoc  = null;
let allChats   = JSON.parse(localStorage.getItem('vc_chats') || '{}');
const patientName = "{{ name }}";

// ── Render doctor pills ────────────────────────────────────────
document.getElementById('docList').innerHTML = DOCTORS.map(d => `
    <div class="doc-pill ${activeDoc?.id===d.id?'active':''}" onclick="openChat(${d.id})">
        🩺 ${d.name}
    </div>
`).join('');

function openChat(docId) {
    activeDoc = DOCTORS.find(d => d.id === docId);
    if (!allChats[docId]) allChats[docId] = [];

    // Mark doctor pills
    document.querySelectorAll('.doc-pill').forEach((p,i) => {
        p.classList.toggle('active', DOCTORS[i].id === docId);
    });

    renderChatUI();
}

function renderChatUI() {
    const area = document.getElementById('chatArea');
    area.innerHTML = `
        <div class="chat-box">
            <div class="chat-header">
                <div class="chat-avatar">👨‍⚕️</div>
                <div class="chat-header-info">
                    <div class="name">${activeDoc.name}</div>
                    <div class="status"><span class="online-dot"></span>Online · ${activeDoc.spec}</div>
                </div>
            </div>
            <div class="messages" id="msgList"></div>
            <div class="quick-replies" id="quickReplies"></div>
            <div class="chat-input-bar">
                <textarea id="msgInput" placeholder="Type your message..." rows="1"
                    onkeydown="handleKey(event)"></textarea>
                <button class="send-btn" onclick="sendMessage()">➤</button>
            </div>
        </div>
    `;
    renderMessages();
    renderQuickReplies();
    // Auto-send welcome if first chat
    if (allChats[activeDoc.id].length === 0) {
        setTimeout(() => receiveMessage(`Hello ${patientName}! I'm ${activeDoc.name}. How can I help you today?`), 600);
    }
}

function renderMessages() {
    const list = document.getElementById('msgList');
    if (!list) return;
    const msgs = allChats[activeDoc.id] || [];
    list.innerHTML = msgs.map(m => `
        <div class="msg ${m.from==='patient'?'me':'them'}">
            <div class="bubble">${m.text}</div>
            <div class="msg-time">${m.time}</div>
        </div>
    `).join('');
    list.scrollTop = list.scrollHeight;
}

function renderQuickReplies() {
    const qr = document.getElementById('quickReplies');
    if (!qr) return;
    qr.innerHTML = QUICK_REPLIES.map(r =>
        `<button class="qr-btn" onclick="sendQuick('${r}')">${r}</button>`
    ).join('');
}

function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function sendMessage() {
    const input = document.getElementById('msgInput');
    const text  = input.value.trim();
    if (!text) return;
    pushMsg('patient', text);
    input.value = '';
    showTyping();
    // AI doctor reply
    getAIReply(text);
}

function sendQuick(text) {
    pushMsg('patient', text);
    showTyping();
    getAIReply(text);
}

function pushMsg(from, text) {
    const now = new Date().toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit' });
    allChats[activeDoc.id].push({ from, text, time: now });
    localStorage.setItem('vc_chats', JSON.stringify(allChats));
    renderMessages();
}

function showTyping() {
    const list = document.getElementById('msgList');
    const div  = document.createElement('div');
    div.className = 'msg them typing-indicator';
    div.id = 'typing';
    div.innerHTML = `<div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
    list.appendChild(div);
    list.scrollTop = list.scrollHeight;
}

function receiveMessage(text) {
    const typing = document.getElementById('typing');
    if (typing) typing.remove();
    pushMsg('doctor', text);
}

async function getAIReply(userMsg) {
    try {
        const res = await fetch('/api/chat_reply', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                doctor: activeDoc.name,
                specialty: activeDoc.spec,
                patient: patientName,
                message: userMsg,
                history: allChats[activeDoc.id].slice(-6)
            })
        });
        const data = await res.json();
        receiveMessage(data.reply);
    } catch(e) {
        receiveMessage("I'm sorry, I'm unable to respond right now. Please try again shortly.");
    }
}
</script>
</body>
</html>
